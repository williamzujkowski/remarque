name: Visual Regression

# Issue #49: `deploy.yml` only builds — nothing notices a Tailwind upgrade
# changing spacing resolution, a font swap, or a token edit until it ships.
# This workflow builds the demo, then runs the Playwright suite in site/
# against `astro preview` of that build:
#   1. Screenshot regression — 5 page archetypes × light/dark × 375/1280px,
#      compared against baselines committed under
#      site/tests/visual.spec.ts-snapshots/. Baselines are generated on
#      Linux (this runner's OS family) and are CI-canonical: if a local
#      run elsewhere disagrees with CI, trust CI, don't hand-edit the PNGs.
#   2. Computed-style assertions (flake-free — no pixel diffing) — the
#      AGENT_RULES.md checklist lines turned into executable tests.
#
# Kept as its own workflow file (not folded into deploy.yml) so it doesn't
# collide with unrelated concurrent edits to the deploy pipeline.

on:
  pull_request:

permissions:
  contents: read

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright's Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: Build Astro site
        run: npm run build

      - name: Run visual regression + computed-style suite
        run: npx playwright test
        env:
          CI: true

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: |
            site/playwright-report/
            site/test-results/
          retention-days: 14
