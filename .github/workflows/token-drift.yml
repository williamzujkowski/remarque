name: Token Drift Check

# Reusable workflow (workflow_call) for remarque-tokens consumers.
#
# Detects whether a consumer's stylesheet has drifted from the installed
# remarque-tokens package. See issues #47/#48 and REMARQUE.md's "Token
# Tiers" section for the classification this implements:
#   - CORE-tier token redefined with a different value, undocumented → FAIL
#   - CORE-tier token redefined with a different value, but named in the
#     consumer's DESIGN-DEVIATIONS.md / DESIGN-NOTES.md → WARN
#   - PALETTE-tier token redefined with a different value → INFO (this is
#     the sanctioned personalization surface, not a problem)
#   - CORE-tier token only ever consumed via var(), never redeclared → no-op
#
# Consensus-panel condition for building this at all ("2-3 consuming
# sites") is met: williamzujkowski.github.io and tsundoku both consume
# remarque-tokens from npm.
#
# Pre-release note: scripts/drift-check.mjs does not yet ship inside a
# published remarque-tokens version — it lands with a future release once
# this PR merges. Until then, this workflow checks out remarque itself at
# `remarque-ref` to source the engine. Once a released remarque-tokens
# version already includes scripts/drift-check.mjs (added to `files` +
# the `remarque-drift` bin in this same PR), this workflow prefers the
# copy sitting in the consumer's own node_modules/remarque-tokens instead
# — no change needed here, and `remarque-ref` simply goes unused. At that
# point callers may also switch to a plain `npx remarque-drift` step and
# drop this reusable workflow entirely; both remain equivalent.
#
# issue #110: three OPTIONAL inputs (`run-audit`, `palette-path`,
# `src-dir`) let a caller also run the `remarque-audit` gate from this
# same workflow_call instead of wiring a second script step in their own
# workflow. `run-audit` defaults to `false`, so every existing caller
# (williamzujkowski.github.io's audits.yml, tsundoku's deploy.yml — both
# call this workflow today with only `css-file`/`package-dir`/
# `remarque-ref`) is unaffected without opting in; verified by reading
# both call sites on their own `main` branches. The audit step runs `npx
# remarque-audit` from the CONSUMER's own checkout, against the
# remarque-tokens the consumer already installed in `inputs.package-dir`
# — no `remarque-ref` fallback here, unlike the drift engine above,
# because `remarque-audit` has shipped as a published bin since 0.1.0
# (there was never a pre-release gap to bridge).
#
# A `run-golden` input (paralleling scripts/palette-golden.mjs) was
# considered, per the issue text, and deliberately NOT added:
# palette-golden.mjs is remarque-internal tooling — it binds THIS
# package's own tokens-palette.css to the `remarque-light`/`remarque-dark`
# reference palettes from @williamzujkowski/oklch-terminal-themes and
# checks remarque's own release hasn't drifted from its golden values. It
# has no CLI bin (package.json's `bin` only exports `remarque-audit`/
# `remarque-drift`/`remarque-theme`), takes no `--palette`/`--src`
# arguments a generic consumer could point at their own stylesheet, and
# has no consumer-facing analog to generify. Exposing it here would not
# be "the same gate, wired in one call" the way `run-audit` is — it would
# be a different, remarque-repo-specific tool with nothing for a
# consumer's palette to hook into.

on:
  workflow_call:
    inputs:
      css-file:
        description: >-
          Path (relative to the consumer repo root) to the stylesheet that
          defines/overrides remarque tokens — the same file you'd pass to
          `remarque-audit --palette`.
        required: true
        type: string
      package-dir:
        description: >-
          Directory containing node_modules/remarque-tokens (where
          remarque-tokens is installed as a dependency) — also where
          `npm ci` / `pnpm install` is run.
        required: true
        type: string
      remarque-ref:
        description: >-
          Git ref of williamzujkowski/remarque to source scripts/drift-check.mjs
          from. Only used pre-release, when the installed remarque-tokens
          package (under package-dir) predates the drift-check bin; ignored
          once the installed package already ships it.
        required: false
        type: string
        default: main
      run-audit:
        description: >-
          Optional. When true, also runs `npx remarque-audit` (from the
          consumer's own checkout, against their own installed
          remarque-tokens under package-dir) as a second gate in this same
          workflow_call. Default false — existing callers that only pass
          css-file/package-dir/remarque-ref are unaffected.
        required: false
        type: boolean
        default: false
      palette-path:
        description: >-
          Path to the palette stylesheet to pass as `remarque-audit
          --palette`, relative to package-dir (the audit step's working
          directory — matching how `npx remarque-audit` is normally
          invoked locally, and how the "Install consumer dependencies"
          step above already treats package-dir as its own cwd). Required
          when run-audit is true; ignored otherwise. Left required:false
          at the schema level (workflow_call has no conditional-required
          inputs) but the audit step fails fast with a clear error if
          run-audit is true and this is left blank.
        required: false
        type: string
        default: ''
      src-dir:
        description: >-
          Directory `remarque-audit` scans for hardcoded colors/font-size
          floors (its `--src` argument), relative to package-dir — same
          convention as palette-path. Only consulted when run-audit is
          true.
        required: false
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22

      - name: Install consumer dependencies
        working-directory: ${{ inputs.package-dir }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@10 --activate
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Checkout remarque (pre-release drift-check.mjs source)
        if: ${{ hashFiles(format('{0}/node_modules/remarque-tokens/scripts/drift-check.mjs', inputs.package-dir)) == '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: williamzujkowski/remarque
          ref: ${{ inputs.remarque-ref }}
          path: .remarque-drift-engine

      - name: Token drift check
        run: |
          set -e
          INSTALLED="${{ inputs.package-dir }}/node_modules/remarque-tokens/scripts/drift-check.mjs"
          if [ -f "$INSTALLED" ]; then
            ENGINE="$INSTALLED"
          else
            ENGINE=".remarque-drift-engine/scripts/drift-check.mjs"
          fi
          node "$ENGINE" --css-file "${{ inputs.css-file }}" --package-dir "${{ inputs.package-dir }}"

      # Optional second gate (issue #110) — off by default, see the file
      # header for why this is opt-in and why there is no run-golden
      # counterpart. Runs from the consumer's own checkout, against the
      # remarque-tokens the consumer already installed above (`npx`
      # resolves the `remarque-audit` bin from package-dir's own
      # node_modules/.bin — no remarque-ref checkout needed, unlike the
      # drift engine, because remarque-audit has been a published bin
      # since 0.1.0).
      - name: Token audit (optional — npx remarque-audit against the consumer's own installed remarque-tokens)
        if: ${{ inputs.run-audit }}
        working-directory: ${{ inputs.package-dir }}
        run: |
          set -e
          if [ -z "${{ inputs.palette-path }}" ]; then
            echo "::error::run-audit is true but palette-path was not provided" >&2
            exit 1
          fi
          npx remarque-audit --palette "${{ inputs.palette-path }}" --src "${{ inputs.src-dir }}"
