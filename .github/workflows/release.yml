name: Publish to npm

# Publishes remarque-tokens on version tags (v0.2.0, v1.0.0, ...).
#
# Auth: npm "trusted publishing" (OIDC) — no NPM_TOKEN secret needed.
# One-time setup after the FIRST (manual) publish: on npmjs.com →
# package → Settings → Trusted Publisher → GitHub Actions →
#   repository: williamzujkowski/remarque, workflow: release.yml
# Until that's configured, tag pushes will fail auth here — expected.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC for npm provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 11.5.1 (trusted publishing support)
        run: npm install -g npm@latest && npm --version

      - name: Token audit gate
        run: node scripts/audit.mjs

      - name: Verify tag matches package.json version
        run: |
          PKG_V="v$(node -p "require('./package.json').version")"
          [ "$PKG_V" = "${GITHUB_REF_NAME}" ] || { echo "tag ${GITHUB_REF_NAME} != package.json ${PKG_V}"; exit 1; }

      - name: Publish (provenance)
        run: npm publish --provenance --access public
